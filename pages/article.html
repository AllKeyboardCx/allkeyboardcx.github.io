    <script>
        function parseMetadata(content) {
            const lines = content.split('\n');
            const data = { title: '', summary: '', tags: [] };
            let bodyStart = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('TITLE ')) {
                    data.title = line.substring(6).trim();
                    bodyStart = i + 1;
                } else if (line.startsWith('SUMMARY ')) {
                    data.summary = line.substring(8).trim();
                    bodyStart = i + 1;
                } else if (line.startsWith('TAG ')) {
                    const tagStr = line.substring(4).trim();
                    data.tags = tagStr ? tagStr.split(',').map(t => t.trim()).filter(t => t) : [];
                    bodyStart = i + 1;
                } else if (line.startsWith('# ') || line.startsWith('## ') || line.startsWith('### ') || line.startsWith('#### ') || line.startsWith('##### ') || line.startsWith('###### ') || (line && !line.startsWith('TITLE') && !line.startsWith('SUMMARY') && !line.startsWith('TAG'))) {
                    break;
                }
            }

            const body = lines.slice(bodyStart).join('\n').trim();
            return { data, body };
        }

        function generateTOC(htmlString) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlString;

            const headings = tempDiv.querySelectorAll('h1, h2, h3, h4, h5, h6');
            if (headings.length === 0) {
                return { html: htmlString, toc: '' };
            }

            const usedIds = {};

            headings.forEach((heading, index) => {
                const text = heading.textContent.trim();
                let baseId = text
                    .toLowerCase()
                    .replace(/[^\w\u4e00-\u9fa5\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .replace(/-+/g, '-')
                    .replace(/^-|-$/g, '');

                if (!baseId) baseId = `heading-${index}`;

                let id = baseId;
                if (usedIds[id]) {
                    usedIds[id]++;
                    id = `${baseId}-${usedIds[baseId]}`;
                } else {
                    usedIds[id] = 1;
                }

                heading.id = id;
            });

            let tocHtml = '<div class="article-toc"><div class="toc-title">📑 目录</div><ul class="toc-list">';
            headings.forEach(heading => {
                const level = parseInt(heading.tagName.substring(1));
                const text = heading.textContent.trim();
                const id = heading.id;
                tocHtml += `<li class="toc-item toc-level-${level}"><a href="#${id}">${escapeHtml(text)}</a></li>`;
            });
            tocHtml += '</ul></div>';

            return { html: tempDiv.innerHTML, toc: tocHtml };
        }

        const CALLOUT_TYPES = {
            note: { icon: '📝', title: '备注', color: '#58a6ff' },
            tip: { icon: '💡', title: '提示', color: '#3fb950' },
            important: { icon: '❗', title: '重要', color: '#a371f7' },
            warning: { icon: '⚠️', title: '警告', color: '#d29922' },
            caution: { icon: '🔴', title: '注意', color: '#f85149' },
            danger: { icon: '🔥', title: '危险', color: '#f85149' },
            info: { icon: 'ℹ️', title: '信息', color: '#58a6ff' },
            success: { icon: '✅', title: '成功', color: '#3fb950' },
            question: { icon: '❓', title: '疑问', color: '#d29922' },
            abstract: { icon: '📋', title: '摘要', color: '#a371f7' },
            example: { icon: '📌', title: '示例', color: '#58a6ff' },
            quote: { icon: '💬', title: '引用', color: '#6e7681' }
        };

        function renderCallouts(htmlString) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlString;

            const blockquotes = tempDiv.querySelectorAll('blockquote');

            blockquotes.forEach(blockquote => {
                const firstElement = blockquote.firstElementChild || blockquote.firstChild;
                if (!firstElement) return;

                let firstText = '';
                if (firstElement.tagName === 'P') {
                    firstText = firstElement.textContent.trim();
                } else if (firstElement.nodeType === 3) {
                    firstText = firstElement.textContent.trim();
                }

                const calloutMatch = firstText.match(/^\[!([^\]]+)\](.*)/);
                if (!calloutMatch) return;

                const type = calloutMatch[1].trim().toLowerCase();
                const titleText = calloutMatch[2].trim();
                const config = CALLOUT_TYPES[type] || CALLOUT_TYPES.note;

                const calloutDiv = document.createElement('div');
                calloutDiv.className = `callout callout-${type}`;
                calloutDiv.style.borderLeftColor = config.color;

                const headerDiv = document.createElement('div');
                headerDiv.className = 'callout-header';
                headerDiv.innerHTML = `<span class="callout-icon">${config.icon}</span> <span class="callout-title">${escapeHtml(titleText || config.title)}</span>`;
                headerDiv.style.color = config.color;
                calloutDiv.appendChild(headerDiv);

                const bodyDiv = document.createElement('div');
                bodyDiv.className = 'callout-body';

                let contentStarted = false;
                const children = Array.from(blockquote.childNodes);
                children.forEach((child, index) => {
                    if (!contentStarted) {
                        if (child.nodeType === 1 && child.tagName === 'P') {
                            const remainingText = firstText.replace(/^\[!([^\]]+)\].*/, '').trim();
                            if (remainingText) {
                                const newP = document.createElement('p');
                                newP.innerHTML = child.innerHTML.replace(/^\[!([^\]]+)\].*/, '').trim();
                                if (newP.innerHTML.trim()) {
                                    bodyDiv.appendChild(newP);
                                }
                            }
                            contentStarted = true;
                            return;
                        }
                        if (child.nodeType === 3) {
                            contentStarted = true;
                            return;
                        }
                    }
                    bodyDiv.appendChild(child.cloneNode(true));
                });

                calloutDiv.appendChild(bodyDiv);
                blockquote.replaceWith(calloutDiv);
            });

            return tempDiv.innerHTML;
        }

        function headingToId(text) {
            let id = text
                .toLowerCase()
                .replace(/[^\w\u4e00-\u9fa5\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');
            return id || 'heading';
        }

        function convertObsidianSyntax(content, currentCategory) {
            // 先处理图片语法 ![[file.png]] 和 ![[file.png|width]]
            content = content.replace(/!\[\[([^\]]+)\]\]/g, (match, inner) => {
                const parts = inner.split('|');
                const filename = parts[0].trim();
                const width = parts[1] ? parts[1].trim() : '';
                if (width) {
                    return `<img src="../pictures/${filename}" width="${width}" alt="${filename}">`;
                }
                return `![${filename}](<../pictures/${filename}>)`;
            });

            // 再处理双链语法 [[...]]
            content = content.replace(/\[\[([^\]]+)\]\]/g, (match, inner) => {
                const parts = inner.split('|');
                const link = parts[0].trim();
                const alias = parts[1] ? parts[1].trim() : '';

                // [[#标题]] 同文档锚点
                if (link.startsWith('#')) {
                    const heading = link.substring(1).trim();
                    const displayText = alias || heading;
                    return `[${displayText}](#${headingToId(heading)})`;
                }

                // [[文件名#标题]] 跨文档锚点
                let heading = '';
                let fileLink = link;
                const hashIndex = link.indexOf('#');
                if (hashIndex !== -1) {
                    fileLink = link.substring(0, hashIndex);
                    heading = link.substring(hashIndex + 1);
                }

                // 判断是否有路径（包含 /）
                let targetCategory, targetFile;
                if (fileLink.includes('/')) {
                    const pathParts = fileLink.split('/');
                    targetCategory = pathParts[0];
                    targetFile = pathParts.slice(1).join('/');
                } else {
                    targetCategory = currentCategory;
                    targetFile = fileLink;
                }

                const displayText = alias || fileLink;
                let url = `article.html?category=${encodeURIComponent(targetCategory)}&file=${encodeURIComponent(targetFile)}`;
                if (heading) {
                    url += `#${headingToId(heading)}`;
                }
                return `[${displayText}](${url})`;
            });

            // 修复标题与列表之间缺少空行（标题行后紧跟列表项）
            content = content.replace(/^([#]+ .+)\n([-*+] |\d+\. )/gm, '$1\n\n$2');
            // 修复列表与标题之间缺少空行（列表项后紧跟标题）
            content = content.replace(/^([-*+] .+)\n([#]+ )/gm, '$1\n\n$2');
            // 修复图片与列表之间缺少空行
            content = content.replace(/^(!\[.*\))\n([-*+] |\d+\. )/gm, '$1\n\n$2');
            content = content.replace(/^(<img[^>]*>)\n([-*+] |\d+\. )/gm, '$1\n\n$2');
            // 修复图片与标题之间缺少空行
            content = content.replace(/^(!\[.*\))\n([#]+ )/gm, '$1\n\n$2');
            content = content.replace(/^(<img[^>]*>)\n([#]+ )/gm, '$1\n\n$2');

            return content;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category');
            const file = urlParams.get('file');

            if (!category || !file) {
                document.getElementById('article-content').innerHTML = `
                    <div class="text-center py-5">
                        <h2 class="text-light">参数错误</h2>
                        <p class="text-muted">请从正确的链接访问文章</p>
                        <a href="../index.html" class="btn btn-primary mt-3">返回首页</a>
                    </div>
                `;
                return;
            }

            const SUPABASE_URL = 'https://dgwuzhngmrksrtdrmjvm.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_fMMt5IGPP8ub6Ys-QfRD4Q_OEse9xv1';
            const viewPath = `${category}/${file}`;

            async function getAndIncrementViews() {
                try {
                    console.log('Supabase URL:', SUPABASE_URL);
                    console.log('View path:', viewPath);
                    
                    const readResponse = await fetch(`${SUPABASE_URL}/rest/v1/views?path=eq.${encodeURIComponent(viewPath)}`, {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    console.log('Read status:', readResponse.status);
                    if (!readResponse.ok) {
                        console.error('Read error:', await readResponse.text());
                        return 0;
                    }
                    
                    const data = await readResponse.json();
                    console.log('Read data:', data);
                    
                    let count = 0;
                    if (data.length > 0) {
                        count = data[0].count || 0;
                    }
                    count++;
                    
                    if (data.length > 0) {
                        const updateResponse = await fetch(`${SUPABASE_URL}/rest/v1/views?path=eq.${encodeURIComponent(viewPath)}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_KEY,
                                'Authorization': `Bearer ${SUPABASE_KEY}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ count: count })
                        });
                        console.log('Update status:', updateResponse.status);
                        if (!updateResponse.ok) {
                            console.error('Update error:', await updateResponse.text());
                        }
                    } else {
                        const createResponse = await fetch(`${SUPABASE_URL}/rest/v1/views`, {
                            method: 'POST',
                            headers: {
                                'apikey': SUPABASE_KEY,
                                'Authorization': `Bearer ${SUPABASE_KEY}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ path: viewPath, count: count })
                        });
                        console.log('Create status:', createResponse.status);
                        if (!createResponse.ok) {
                            console.error('Create error:', await createResponse.text());
                        }
                    }
                    return count;
                } catch (error) {
                    console.error('更新阅读量失败:', error);
                    return 0;
                }
            }

            getAndIncrementViews().then(viewCount => {
                fetch(`../content/${category}/${file}.md`)
                    .then(response => {
                        if (!response.ok) throw new Error('文章不存在');
                        return response.text();
                    })
                    .then(mdContent => {
                        const { data, body } = parseMetadata(mdContent);
                        const convertedBody = convertObsidianSyntax(body, category);
                        const htmlContent = marked.parse(convertedBody);
                        const { html: finalHtml, toc } = generateTOC(htmlContent);
                        const calloutHtml = renderCallouts(finalHtml);
                        document.getElementById('article-content').innerHTML = `
                            <div class="mb-4 text-muted">阅读量: ${viewCount}</div>
                            ${toc}
                            ${calloutHtml}
                        `;

                        document.querySelectorAll('pre code').forEach(block => {
                            hljs.highlightElement(block);
                        });

                        const titleElement = document.querySelector('h1');
                        if (titleElement) {
                            document.title = titleElement.textContent + ' - AllKeyboard的小屋';
                        }
                    })
                    .catch(error => {
                        document.getElementById('article-content').innerHTML = `
                            <div class="text-center py-5">
                                <h2 class="text-light">文章未找到</h2>
                                <p class="text-muted">${error.message}</p>
                                <a href="${category}.html" class="btn btn-primary mt-3">返回列表</a>
                            </div>
                        `;
                    });
            });
            
            Promise.all([
                fetch('../content/security/index.json?t=' + Date.now()).then(r => r.json()),
                fetch('../content/binary/index.json?t=' + Date.now()).then(r => r.json()),
                fetch('../content/web-security/index.json?t=' + Date.now()).then(r => r.json())
            ])
            .then(([securityPosts, binaryPosts, webPosts]) => {
                const allPosts = [...securityPosts, ...binaryPosts, ...webPosts];
                const allTags = allPosts.reduce((tags, post) => [...tags, ...post.tags], []);
                const tagCounts = {};
                allTags.forEach(tag => {
                    tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                });
                const tagCloud = document.getElementById('tag-cloud');
                tagCloud.innerHTML = Object.entries(tagCounts).map(([tag, count]) => 
                    `<span class="badge bg-secondary me-1 mb-1">${tag} (${count})</span>`
                ).join('');
            })
            .catch(error => {
                console.error('加载标签云失败:', error);
                document.getElementById('tag-cloud').innerHTML = '<span class="text-muted">加载失败</span>';
            });

            document.getElementById('comment-form').addEventListener('submit', function(e) {
                e.preventDefault();
                submitComment();
            });
            loadComments();
        });

        function generateAvatar(username) {
            const colors = [
                '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7',
                '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9'
            ];
            const hash = username.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            const color = colors[hash % colors.length];
            const firstChar = username.charAt(0);
            const displayChar = /[\u4e00-\u9fa5]/.test(firstChar) ? firstChar : firstChar.toUpperCase();
            
            return `<div class="rounded-circle" style="width: 50px; height: 50px; background-color: ${color}; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px;">${displayChar}</div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        async function loadComments() {
            const SUPABASE_URL = 'https://dgwuzhngmrksrtdrmjvm.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_fMMt5IGPP8ub6Ys-QfRD4Q_OEse9xv1';
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category');
            const file = urlParams.get('file');
            const postId = `${category}/${file}`;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/comments?post_id=eq.${encodeURIComponent(postId)}&order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                if (!response.ok) {
                    console.error('加载评论失败:', await response.text());
                    document.getElementById('comments-list').innerHTML = '<div class="text-center text-muted py-4">加载评论失败</div>';
                    return;
                }
                const comments = await response.json();
                renderComments(comments);
            } catch (error) {
                console.error('加载评论失败:', error);
                document.getElementById('comments-list').innerHTML = '<div class="text-center text-muted py-4">加载评论失败</div>';
            }
        }

        let currentReplyTarget = null;

        function renderComments(comments) {
            const commentsList = document.getElementById('comments-list');
            if (comments.length === 0) {
                commentsList.innerHTML = '<div class="text-center text-muted py-4">暂无评论，快来发表第一条吧！</div>';
                return;
            }

            const commentMap = {};
            const topLevel = [];

            comments.forEach(c => {
                commentMap[c.id] = { ...c, replies: [] };
            });

            comments.forEach(c => {
                if (c.parent_id && commentMap[c.parent_id]) {
                    commentMap[c.parent_id].replies.push(commentMap[c.id]);
                } else {
                    topLevel.push(commentMap[c.id]);
                }
            });

            function renderComment(comment, isReply = false) {
                const replyToText = comment.reply_to ? `回复 <span class="reply-to">@${escapeHtml(comment.reply_to)}</span>` : '';
                return `
                    <div class="comment-item ${isReply ? 'comment-reply' : ''}" data-comment-id="${comment.id}">
                        <div class="d-flex">
                            <div class="flex-shrink-0">
                                ${generateAvatar(comment.username)}
                            </div>
                            <div class="ms-3 flex-grow-1">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <span class="fw-bold">${escapeHtml(comment.username)}</span>
                                        ${replyToText}
                                    </div>
                                    <span class="text-muted text-sm">${formatDate(comment.created_at)}</span>
                                </div>
                                <p class="mt-1 mb-1">${escapeHtml(comment.content)}</p>
                                <button class="btn btn-sm btn-link reply-btn" onclick="toggleReplyForm('${comment.id}', '${escapeHtml(comment.username)}')">
                                    💬 回复
                                </button>
                                <div class="reply-form-container" id="reply-form-${comment.id}" style="display: none; margin-top: 10px;">
                                    <form class="reply-form" data-parent-id="${comment.id}" data-reply-to="${escapeHtml(comment.username)}">
                                        <div class="mb-2">
                                            <input type="text" class="form-control form-control-sm reply-username" placeholder="您的昵称" required />
                                        </div>
                                        <div class="mb-2">
                                            <textarea class="form-control form-control-sm reply-content" rows="2" placeholder="回复 @${escapeHtml(comment.username)}..." required></textarea>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <button type="submit" class="btn btn-primary btn-sm">发表回复</button>
                                            <button type="button" class="btn btn-secondary btn-sm" onclick="toggleReplyForm('${comment.id}')">取消</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                        ${comment.replies && comment.replies.length > 0 ? `
                            <div class="replies-container">
                                ${comment.replies.map(r => renderComment(r, true)).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            commentsList.innerHTML = topLevel.map(c => renderComment(c, false)).join('');

            document.querySelectorAll('.reply-form').forEach(form => {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const parentId = this.dataset.parentId;
                    const replyTo = this.dataset.replyTo;
                    const username = this.querySelector('.reply-username').value.trim();
                    const content = this.querySelector('.reply-content').value.trim();
                    if (!username || !content) {
                        alert('请填写完整信息');
                        return;
                    }
                    submitComment(username, content, parentId, replyTo);
                });
            });
        }

        function toggleReplyForm(commentId, replyToUsername) {
            const formContainer = document.getElementById(`reply-form-${commentId}`);
            if (!formContainer) return;

            const isVisible = formContainer.style.display !== 'none';

            document.querySelectorAll('.reply-form-container').forEach(el => {
                el.style.display = 'none';
            });

            if (!isVisible) {
                formContainer.style.display = 'block';
                const textarea = formContainer.querySelector('.reply-content');
                if (textarea) textarea.focus();
            }
        }

        async function submitComment(usernameInput, contentInput, parentId = null, replyTo = null) {
            const SUPABASE_URL = 'https://dgwuzhngmrksrtdrmjvm.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_fMMt5IGPP8ub6Ys-QfRD4Q_OEse9xv1';
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category');
            const file = urlParams.get('file');
            const postId = `${category}/${file}`;

            let username, content;
            let isReply = parentId !== null;

            if (isReply) {
                username = usernameInput;
                content = contentInput;
            } else {
                username = document.getElementById('comment-username').value.trim();
                content = document.getElementById('comment-content').value.trim();
            }

            if (!username || !content) {
                alert('请填写完整信息');
                return;
            }

            const bodyData = {
                post_id: postId,
                username: username,
                content: content,
                created_at: new Date().toISOString()
            };

            if (parentId) {
                bodyData.parent_id = parentId;
            }
            if (replyTo) {
                bodyData.reply_to = replyTo;
            }

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/comments`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bodyData)
                });
                
                if (!response.ok) {
                    console.error('发表评论失败:', await response.text());
                    alert('发表评论失败，请稍后重试');
                    return;
                }
                
                if (!isReply) {
                    document.getElementById('comment-form').reset();
                } else {
                    document.querySelectorAll('.reply-form-container').forEach(el => {
                        el.style.display = 'none';
                    });
                }
                loadComments();
            } catch (error) {
                console.error('发表评论失败:', error);
                alert('发表评论失败，请稍后重试');
            }
        }
    </script>
</body>
</html>
