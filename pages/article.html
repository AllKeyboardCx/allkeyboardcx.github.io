    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script>
        function parseMetadata(content) {
            const lines = content.split('\n');
            const data = { title: '', summary: '', tags: [] };
            let bodyStart = 0;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('TITLE ')) {
                    data.title = line.substring(6).trim();
                    bodyStart = i + 1;
                } else if (line.startsWith('SUMMARY ')) {
                    data.summary = line.substring(8).trim();
                    bodyStart = i + 1;
                } else if (line.startsWith('TAG ')) {
                    const tagStr = line.substring(4).trim();
                    data.tags = tagStr ? tagStr.split(',').map(t => t.trim()).filter(t => t) : [];
                    bodyStart = i + 1;
                } else if (line.startsWith('# ') || line.startsWith('## ') || line.startsWith('### ') || line.startsWith('#### ') || line.startsWith('##### ') || line.startsWith('###### ') || (line && !line.startsWith('TITLE') && !line.startsWith('SUMMARY') && !line.startsWith('TAG'))) {
                    break;
                }
            }
            
            const body = lines.slice(bodyStart).join('\n').trim();
            return { data, body };
        }

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category');
            const file = urlParams.get('file');

            if (!category || !file) {
                document.getElementById('article-content').innerHTML = `
                    <div class="text-center py-5">
                        <h2 class="text-light">参数错误</h2>
                        <p class="text-muted">请从正确的链接访问文章</p>
                        <a href="../index.html" class="btn btn-primary mt-3">返回首页</a>
                    </div>
                `;
                return;
            }

            const viewKey = `views_${category}_${file}`;
            const views = parseInt(localStorage.getItem(viewKey) || '0');
            localStorage.setItem(viewKey, views + 1);

            fetch(`../content/${category}/${file}.md`)
                .then(response => {
                    if (!response.ok) throw new Error('文章不存在');
                    return response.text();
                })
                .then(mdContent => {
                    const { data, body } = parseMetadata(mdContent);
                    const htmlContent = marked.parse(body);
                    document.getElementById('article-content').innerHTML = `
                        <div class="mb-4 text-muted">阅读量: ${views + 1}</div>
                        ${htmlContent}
                    `;
                    
                    document.querySelectorAll('pre code').forEach(block => {
                        hljs.highlightElement(block);
                    });
                    
                    const titleElement = document.querySelector('h1');
                    if (titleElement) {
                        document.title = titleElement.textContent + ' - AllKeyboard的小屋';
                    }
                })
                .catch(error => {
                    document.getElementById('article-content').innerHTML = `
                        <div class="text-center py-5">
                            <h2 class="text-light">文章未找到</h2>
                            <p class="text-muted">${error.message}</p>
                            <a href="${category}.html" class="btn btn-primary mt-3">返回列表</a>
                        </div>
                    `;
                });
            
            Promise.all([
                fetch('../content/security/index.json?t=' + Date.now()).then(r => r.json()),
                fetch('../content/binary/index.json?t=' + Date.now()).then(r => r.json()),
                fetch('../content/web-security/index.json?t=' + Date.now()).then(r => r.json())
            ])
            .then(([securityPosts, binaryPosts, webPosts]) => {
                const allPosts = [...securityPosts, ...binaryPosts, ...webPosts];
                const allTags = allPosts.reduce((tags, post) => [...tags, ...post.tags], []);
                const tagCounts = {};
                allTags.forEach(tag => {
                    tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                });
                const tagCloud = document.getElementById('tag-cloud');
                tagCloud.innerHTML = Object.entries(tagCounts).map(([tag, count]) => 
                    `<span class="badge bg-secondary me-1 mb-1">${tag} (${count})</span>`
                ).join('');
            })
            .catch(error => {
                console.error('加载标签云失败:', error);
                document.getElementById('tag-cloud').innerHTML = '<span class="text-muted">加载失败</span>';
            });
        });
    </script>
