        <div class="container mt-5">
            <div class="row">
                <div class="col-lg-9">
                    <h1 class="fw-bolder mb-4">🔍 搜索结果</h1>
                    <div class="mb-4">
                        <div class="input-group">
                            <input id="search-input" class="form-control bg-gray text-light" type="text" placeholder="输入关键词搜索..." aria-label="搜索" />
                            <button id="search-btn" class="btn btn-primary" type="button">搜索</button>
                        </div>
                    </div>
                    <div class="list-group" id="search-results">
                        <div class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>

                        </div>

                <div class="col-lg-3">
                    <div class="card mb-4 bg-dark border-gray">
                        <div class="card-header text-light">📊 搜索统计</div>
                        <div class="card-body">
                            <p class="text-light">找到 <span class="text-primary" id="result-count">0</span> 篇文章</p>
                        </div>
                    </div>
                    <div class="card mb-4 bg-dark border-gray">
                        <div class="card-header text-light">🏷️ 热门标签</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q') || '';
            const category = urlParams.get('category') || '';
            
            document.getElementById('search-input').value = query;
            
            performSearch(query, category);
            
            document.getElementById('search-btn').addEventListener('click', function() {
                const newQuery = document.getElementById('search-input').value.trim();
                if (newQuery) {
                    performSearch(newQuery, '');
                }
            });
            
            document.getElementById('search-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const newQuery = document.getElementById('search-input').value.trim();
                    if (newQuery) {
                        performSearch(newQuery, '');
                    }
                }
            });
        });
        
        function performSearch(query, filterCategory) {
            const resultsContainer = document.getElementById('search-results');
            const resultCount = document.getElementById('result-count');
            
            if (!query) {
                resultsContainer.innerHTML = `
                    <div class="text-center py-8 text-muted">
                        <h3>请输入搜索关键词</h3>
                        <p>在上方搜索框中输入关键词，按回车或点击搜索按钮开始搜索</p>
                    </div>
                `;
                resultCount.textContent = '0';
                return;
            }
            
            resultsContainer.innerHTML = `
                <div class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">搜索中...</span>
                    </div>
                </div>
            `;
            
            Promise.all([
                fetch('../content/security/index.json?t=' + Date.now()).then(r => r.json()),
                fetch('../content/binary/index.json?t=' + Date.now()).then(r => r.json()),
                fetch('../content/web-security/index.json?t=' + Date.now()).then(r => r.json())
            ])
            .then(([securityPosts, binaryPosts, webPosts]) => {
                const allPosts = [
                    ...securityPosts.map(p => ({ ...p, category: 'security' })),
                    ...binaryPosts.map(p => ({ ...p, category: 'binary' })),
                    ...webPosts.map(p => ({ ...p, category: 'web-security' }))
                ];
                
                const filteredPosts = allPosts.filter(post => {
                    if (filterCategory && post.category !== filterCategory) return false;
                    const searchText = `${post.title} ${post.summary} ${post.tags.join(' ')}`.toLowerCase();
                    return searchText.includes(query.toLowerCase());
                });
                
                resultCount.textContent = filteredPosts.length;
                
                if (filteredPosts.length === 0) {
                    resultsContainer.innerHTML = `
                        <div class="text-center py-8 text-muted">
                            <h3>未找到相关文章</h3>
                            <p>尝试使用其他关键词搜索</p>
                        </div>
                    `;
                } else {
                    const categoryNames = {
                        'security': '安全研究',
                        'binary': '二进制/Pwn',
                        'web-security': 'Web安全'
                    };
                    
                    resultsContainer.innerHTML = filteredPosts.map(post => `
                        <a href="article.html?category=${post.category}&file=${post.filename}" class="list-group-item list-group-item-action bg-dark text-light border-gray">
                            <div class="d-flex w-100 justify-content-between">
                                <h5 class="mb-1">${post.title}</h5>
                                <small class="badge bg-primary text-white">${categoryNames[post.category]}</small>
                            </div>
                            <p class="mb-1">${post.summary}</p>
                            <div class="d-flex w-100 justify-content-between">
                                <small class="text-muted">#${post.tags.join(' #')}</small>
                                <small class="text-muted">${post.date}</small>
                            </div>
                        </a>
                    `).join('');
                }
                
                const allTags = allPosts.reduce((tags, post) => [...tags, ...post.tags], []);
                const tagCounts = {};
                allTags.forEach(tag => {
                    tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                });
                const sortedTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
                const hotTags = document.getElementById('hot-tags');
                hotTags.innerHTML = sortedTags.map(([tag, count]) => 
                    `<a href="search.html?q=${encodeURIComponent(tag)}" class="badge bg-secondary me-1 mb-1 text-decoration-none">${tag} (${count})</a>`
                ).join('');
            })
            .catch(error => {
                console.error('搜索失败:', error);
                resultsContainer.innerHTML = `
                    <div class="text-center py-4 text-muted">
                        搜索失败，请稍后重试
                    </div>
                `;
            });
        }
    </script>
