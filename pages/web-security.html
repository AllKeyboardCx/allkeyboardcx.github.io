                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

                        <li class="nav-item"><a class="nav-link" href="search.html">归档</a></li>

                    </ul>

        <div class="container mt-5">
            <div class="row">
                <div class="col-lg-9">
                    <h1 class="fw-bolder mb-4">🌐 Web安全</h1>
                    <div class="mb-6">
                        <p class="fs-5 text-muted">Web应用安全漏洞分析与防护</p>
                    </div>
                    <div class="list-group" id="article-list">
                        <div class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3">
                    <div class="card mb-4 bg-dark border-gray">
                        <div class="card-header text-light">🔍 搜索</div>
                        <div class="card-body">
                            <form action="search.html" method="get">
                                <div class="input-group">
                                    <input class="form-control bg-gray text-light" type="text" name="q" placeholder="搜索Web安全文章..." aria-label="搜索" />
                                    <input type="hidden" name="category" value="web-security" />
                                    <button class="btn btn-primary" type="submit">Go!</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="card mb-4 bg-dark border-gray">
                        <div class="card-header text-light">🏷️ 标签云</div>
                        <div class="card-body" id="tag-cloud">
                            <span class="text-muted">加载中...</span>
                        </div>
                    </div>
                    <div class="card mb-4 bg-dark border-gray">
                        <div class="card-header text-light">📊 统计信息</div>
                        <div class="card-body">
                            <p class="text-light">共 <span class="text-primary" id="article-count">0</span> 篇文章</p>
                            <p class="text-light">总阅读量 <span class="text-primary" id="total-views">0</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer class="py-5 bg-black mt-auto">
            <div class="container"><p class="m-0 text-center text-white">Copyright &copy; AllKeyboardCx 2026</p></div>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('../content/web-security/index.json?t=' + Date.now())
                .then(response => response.json())
                .then(posts => {
                    const listContainer = document.getElementById('article-list');
                    listContainer.innerHTML = posts.map(post => {
                        const views = parseInt(localStorage.getItem(`views_web-security_${post.filename}`) || '0');
                        return `
                        <a href="article.html?category=web-security&file=${post.filename}" class="list-group-item list-group-item-action bg-dark text-light border-gray">
                            <div class="d-flex w-100 justify-content-between">
                                <h5 class="mb-1">${post.title}</h5>
                                <small class="text-muted">${post.date}</small>
                            </div>
                            <p class="mb-1">${post.summary}</p>
                            <div class="d-flex w-100 justify-content-between">
                                <small class="text-muted">#${post.tags.join(' #')}</small>
                                <small class="text-muted">阅读量: ${views}</small>
                            </div>
                        </a>
                    `}).join('');
                    
                    document.getElementById('article-count').textContent = posts.length;
                    
                    const totalViews = posts.reduce((sum, post) => {
                        return sum + parseInt(localStorage.getItem(`views_web-security_${post.filename}`) || '0');
                    }, 0);
                    document.getElementById('total-views').textContent = totalViews.toLocaleString();
                    
                    const allTags = posts.reduce((tags, post) => [...tags, ...post.tags], []);
                    const tagCounts = {};
                    allTags.forEach(tag => {
                        tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                    });
                    const tagCloud = document.getElementById('tag-cloud');
                    tagCloud.innerHTML = Object.entries(tagCounts).map(([tag, count]) => 
                        `<a href="search.html?q=${encodeURIComponent(tag)}" class="badge bg-secondary me-1 mb-1 text-decoration-none">${tag} (${count})</a>`
                    ).join('');
                })
                .catch(error => {
                    document.getElementById('article-list').innerHTML = `
                        <div class="text-center py-4 text-muted">
                            加载文章列表失败
                        </div>
                    `;
                });
        });
    </script>
</body>
</html>
