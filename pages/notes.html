        <div class="container mt-5">
            <div class="row">
                <div class="col-lg-8">
                    <h1 class="fw-bolder mb-4">📝 学习笔记</h1>
                    <div class="mb-6">
                        <p class="fs-5 text-muted">记录学习过程中的要点与心得</p>
                    </div>

                    <div class="card mb-4">
                        <div class="card-header">
                            <div class="d-flex justify-content-between align-items-center">
                                <h3 class="h4 text-light">✏️ 新建笔记</h3>
                                <button class="btn btn-primary btn-sm" onclick="saveNote()">发布笔记</button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <input type="text" class="form-control" id="note-title" placeholder="笔记标题" />
                            </div>
                            <div class="mb-3">
                                <textarea class="form-control" id="note-content" rows="8" placeholder="在这里编写Markdown格式的笔记...&#10;&#10;示例：&#10;# 标题&#10;## 子标题&#10;- 列表项&#10;```python&#10;print('hello')&#10;```"></textarea>
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control" id="note-password" placeholder="请输入发布口令" />
                            </div>
                        </div>
                    </div>

                    <div class="scrollable-list-container">
                    <div id="notes-list">
                        <div class="text-center text-muted py-4">加载笔记中...</div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card mb-4">
                        <div class="card-header text-light">🔍 搜索笔记</div>
                        <div class="card-body">
                            <input class="form-control" type="text" id="search-input" placeholder="搜索学习笔记..." oninput="searchNotes()" />
                        </div>
                    </div>
                    <div class="card mb-4">
                        <div class="card-header text-light">🏷️ 笔记标签</div>
                        <div class="card-body" id="note-tags">
                            <span class="text-muted">加载中...</span>
                        </div>
                    </div>
                    <div class="card mb-4">
                        <div class="card-header text-light">📊 笔记统计</div>
                        <div class="card-body">
                            <div class="row text-center">
                                <div class="col-6">
                                    <p class="text-primary fs-3" id="note-count">0</p>
                                    <p class="text-muted small">总笔记数</p>
                                </div>
                                <div class="col-6">
                                    <p class="text-primary fs-3" id="view-count">0</p>
                                    <p class="text-muted small">总浏览量</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer class="py-5 bg-black mt-auto">
            <div class="container"><p class="m-0 text-center text-white">Copyright &copy; AllKeyboardCx 2026</p></div>
        </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/13.0.1/marked.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://dgwuzhngmrksrtdrmjvm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_fMMt5IGPP8ub6Ys-QfRD4Q_OEse9xv1';
        const PASSWORD = 'allkeyboard314';
        let allNotes = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadNotes();
        });

        async function loadNotes() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/notes?order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                if (!response.ok) {
                    console.error('加载笔记失败:', await response.text());
                    document.getElementById('notes-list').innerHTML = '<div class="text-center text-muted py-4">加载笔记失败</div>';
                    return;
                }
                allNotes = await response.json();
                renderNotes(allNotes);
                updateTags();
                updateStats();
            } catch (error) {
                console.error('加载笔记失败:', error);
                document.getElementById('notes-list').innerHTML = '<div class="text-center text-muted py-4">加载笔记失败</div>';
            }
        }

        function renderNotes(notes) {
            const notesList = document.getElementById('notes-list');
            if (notes.length === 0) {
                notesList.innerHTML = '<div class="text-center text-muted py-4">暂无笔记，快来发布第一条吧！</div>';
                return;
            }
            notesList.innerHTML = notes.map(note => `
                <div class="card mb-4 note-card" data-id="${note.id}">
                    <div class="card-header" style="cursor: pointer;" onclick="toggleNote(${note.id})">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-2">
                                <span class="note-toggle text-light" id="toggle-${note.id}">▶</span>
                                <h3 class="h4 text-light mb-0">${escapeHtml(note.title)}</h3>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <span class="small text-muted">${formatDate(note.created_at)}</span>
                                <button class="btn btn-outline-primary btn-sm" onclick="event.stopPropagation(); openEditModal(${note.id})" title="编辑笔记">
                                    ✏️
                                </button>
                                <button class="btn btn-outline-danger btn-sm" onclick="event.stopPropagation(); confirmDelete(${note.id})" title="删除笔记">
                                    🗑️
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body note-content" id="note-body-${note.id}" style="display: none;">
                        ${marked.parse(note.content)}
                    </div>
                    <div class="card-footer text-muted" id="note-footer-${note.id}" style="display: none;">
                        <span>👁️ 浏览量: <span id="views-${note.id}">${note.views || 0}</span></span>
                    </div>
                </div>
            `).join('');
        }

        async function saveNote() {
            const title = document.getElementById('note-title').value.trim();
            const content = document.getElementById('note-content').value.trim();
            const password = document.getElementById('note-password').value.trim();

            if (!title || !content) {
                alert('请填写标题和内容');
                return;
            }

            if (password !== PASSWORD) {
                alert('口令错误！');
                return;
            }

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/notes`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        content: content,
                        views: 0,
                        created_at: new Date().toISOString()
                    })
                });

                if (!response.ok) {
                    console.error('发布笔记失败:', await response.text());
                    alert('发布笔记失败，请稍后重试');
                    return;
                }

                document.getElementById('note-title').value = '';
                document.getElementById('note-content').value = '';
                document.getElementById('note-password').value = '';
                
                loadNotes();
                alert('发布成功！');
            } catch (error) {
                console.error('发布笔记失败:', error);
                alert('发布笔记失败，请稍后重试');
            }
        }

        function toggleNote(id) {
            const body = document.getElementById(`note-body-${id}`);
            const footer = document.getElementById(`note-footer-${id}`);
            const toggle = document.getElementById(`toggle-${id}`);
            
            if (body.style.display === 'none') {
                body.style.display = 'block';
                footer.style.display = 'block';
                toggle.textContent = '▼';
                incrementView(id);
            } else {
                body.style.display = 'none';
                footer.style.display = 'none';
                toggle.textContent = '▶';
            }
        }

        const viewedNotesSession = new Set();

        async function incrementView(id) {
            if (viewedNotesSession.has(id)) {
                return;
            }
            viewedNotesSession.add(id);

            const note = allNotes.find(n => n.id === id);
            if (!note) return;

            const oldViews = note.views || 0;
            const newViews = oldViews + 1;
            note.views = newViews;
            const viewsEl = document.getElementById(`views-${id}`);
            if (viewsEl) {
                viewsEl.textContent = newViews;
            }
            updateStats();

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/notes?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        views: newViews
                    })
                });

                if (!response.ok) {
                    console.error('更新浏览量失败:', await response.text());
                    note.views = oldViews;
                    if (viewsEl) {
                        viewsEl.textContent = oldViews;
                    }
                    updateStats();
                    viewedNotesSession.delete(id);
                    return;
                }

                const data = await response.json();
                if (data && data.length > 0) {
                    note.views = data[0].views;
                    if (viewsEl) {
                        viewsEl.textContent = data[0].views;
                    }
                    updateStats();
                }
            } catch (error) {
                console.error('更新浏览量失败:', error);
                note.views = oldViews;
                if (viewsEl) {
                    viewsEl.textContent = oldViews;
                }
                updateStats();
                viewedNotesSession.delete(id);
            }
        }

        function searchNotes() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allNotes.filter(note => 
                note.title.toLowerCase().includes(query) || 
                note.content.toLowerCase().includes(query)
            );
            renderNotes(filtered);
        }

        function updateTags() {
            const tagCounts = {};
            allNotes.forEach(note => {
                const words = note.title.split(/[\s,，、]+/);
                words.forEach(word => {
                    if (word.length >= 2) {
                        tagCounts[word] = (tagCounts[word] || 0) + 1;
                    }
                });
            });
            
            const tags = Object.entries(tagCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);
            
            const tagContainer = document.getElementById('note-tags');
            tagContainer.innerHTML = tags.map(([tag, count]) => 
                `<span class="badge bg-secondary me-1 mb-1">${tag} (${count})</span>`
            ).join('');
        }

        function updateStats() {
            document.getElementById('note-count').textContent = allNotes.length;
            const totalViews = allNotes.reduce((sum, note) => sum + (note.views || 0), 0);
            document.getElementById('view-count').textContent = totalViews.toLocaleString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        let currentDeleteId = null;
        let deleteModal = null;

        function confirmDelete(id) {
            currentDeleteId = id;
            const modalHtml = `
                <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content bg-dark border-gray">
                            <div class="modal-header">
                                <h5 class="modal-title text-light" id="deleteModalLabel">⚠️ 确认删除</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <p class="text-light">确定要删除这篇笔记吗？此操作不可撤销。</p>
                                <div class="mb-3">
                                    <label class="form-label text-light">请输入删除口令：</label>
                                    <input type="password" class="form-control" id="delete-password" placeholder="请输入口令" />
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                <button type="button" class="btn btn-danger" onclick="deleteNote()">确认删除</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            if (!document.getElementById('deleteModal')) {
                document.body.insertAdjacentHTML('beforeend', modalHtml);
            }
            const modalEl = document.getElementById('deleteModal');
            deleteModal = bootstrap.Modal.getOrCreateInstance(modalEl);
            document.getElementById('delete-password').value = '';
            deleteModal.show();
        }

        async function deleteNote() {
            const password = document.getElementById('delete-password').value.trim();

            if (password !== PASSWORD) {
                alert('口令错误！');
                return;
            }

            if (!currentDeleteId) return;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/notes?id=eq.${currentDeleteId}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    }
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('删除笔记失败:', errorText);
                    alert('删除笔记失败，请稍后重试\n\n错误信息: ' + errorText);
                    return;
                }

                const data = await response.json();

                if (!data || data.length === 0) {
                    alert('删除失败：Supabase RLS 策略阻止了删除操作。\n\n请在 Supabase SQL Editor 中执行以下 SQL：\n\nCREATE POLICY "Allow public delete" ON notes FOR DELETE USING (true);');
                    return;
                }

                if (deleteModal) {
                    deleteModal.hide();
                }

                const noteCard = document.querySelector(`.note-card[data-id="${currentDeleteId}"]`);
                if (noteCard) {
                    noteCard.remove();
                }

                loadNotes();
                alert('删除成功！');
            } catch (error) {
                console.error('删除笔记失败:', error);
                alert('删除笔记失败，请稍后重试\n\n错误: ' + error.message);
            }
        }

        let currentEditId = null;
        let editModal = null;

        function openEditModal(id) {
            currentEditId = id;
            const note = allNotes.find(n => n.id === id);
            if (!note) return;

            if (!document.getElementById('editModal')) {
                const modalHtml = `
                    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
                        <div class="modal-dialog modal-lg">
                            <div class="modal-content bg-dark border-gray">
                                <div class="modal-header">
                                    <h5 class="modal-title text-light" id="editModalLabel">✏️ 编辑笔记</h5>
                                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <div class="modal-body">
                                    <div class="mb-3">
                                        <label class="form-label text-light">笔记标题</label>
                                        <input type="text" class="form-control" id="edit-title" />
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-light">笔记内容</label>
                                        <textarea class="form-control" id="edit-content" rows="10"></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-light">请输入发布口令</label>
                                        <input type="password" class="form-control" id="edit-password" placeholder="请输入口令" />
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                    <button type="button" class="btn btn-primary" onclick="saveEdit()">保存修改</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
            }

            document.getElementById('edit-title').value = note.title;
            document.getElementById('edit-content').value = note.content;
            document.getElementById('edit-password').value = '';

            const modalEl = document.getElementById('editModal');
            editModal = bootstrap.Modal.getOrCreateInstance(modalEl);
            editModal.show();
        }

        async function saveEdit() {
            const title = document.getElementById('edit-title').value.trim();
            const content = document.getElementById('edit-content').value.trim();
            const password = document.getElementById('edit-password').value.trim();

            if (!title || !content) {
                alert('请填写标题和内容');
                return;
            }

            if (password !== PASSWORD) {
                alert('口令错误！');
                return;
            }

            if (!currentEditId) return;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/notes?id=eq.${currentEditId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        title: title,
                        content: content,
                        created_at: new Date().toISOString()
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('更新笔记失败:', errorText);
                    alert('更新笔记失败，请稍后重试\n\n错误信息: ' + errorText);
                    return;
                }

                const data = await response.json();

                if (!data || data.length === 0) {
                    alert('更新失败：Supabase RLS 策略阻止了更新操作。\n\n请在 Supabase SQL Editor 中执行以下 SQL：\n\nCREATE POLICY "Allow public update" ON notes FOR UPDATE USING (true);');
                    return;
                }

                if (editModal) {
                    editModal.hide();
                }

                loadNotes();
                alert('修改成功！');
            } catch (error) {
                console.error('更新笔记失败:', error);
                alert('更新笔记失败，请稍后重试\n\n错误: ' + error.message);
            }
        }
    </script>
